AutoName: MCMOTD
Description: |-
    Check the MOTD (Message of the Day) and other information of any Minecraft Java server.
    
    Features:
    * View server MOTD
    * Check online player count
    * See server version and protocol
    * Fast and simple interface

    Simply enter a server address and get instant information about the Minecraft server.

